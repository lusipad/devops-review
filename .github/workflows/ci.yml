name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore
        run: dotnet restore DevOpsReview.slnx

      - name: Verify formatting and analyzers
        run: dotnet format DevOpsReview.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build DevOpsReview.slnx --configuration Release --no-restore

      - name: Test Bridge
        run: dotnet test DevOpsReview.slnx --configuration Release --no-build

      - name: Test extension
        run: npm test --prefix extension

      - name: Package Windows release
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            '0.2.0'
          }
          .\scripts\package-release.ps1 -Version $version

      - uses: actions/upload-artifact@v4
        with:
          name: devops-review-windows
          path: |
            artifacts/devops-review-*-win-x64.zip
            artifacts/devops-review-*-win-x64.zip.sha256
            artifacts/DevOpsReview-Setup-*.exe
            artifacts/DevOpsReview-Setup-*.exe.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: devops-review-windows
          path: release-assets

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release-assets/*
          --verify-tag
          --generate-notes
          --title "$GITHUB_REF_NAME"
