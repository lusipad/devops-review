name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore
        run: dotnet restore DevOpsReview.slnx

      - name: Verify formatting and analyzers
        run: dotnet format DevOpsReview.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build DevOpsReview.slnx --configuration Release --no-restore

      - name: Test Bridge
        run: dotnet test DevOpsReview.slnx --configuration Release --no-build

      - name: Test extension
        run: npm test --prefix extension

      - name: Package Windows release
        shell: pwsh
        run: .\scripts\package-release.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: devops-review-0.1.0-win-x64
          path: |
            artifacts/devops-review-0.1.0-win-x64.zip
            artifacts/devops-review-0.1.0-win-x64.zip.sha256
          if-no-files-found: error
